<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participation List - Ayawaso West</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f0f0;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .navbar {
            background: #008000;
            padding: 12px 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            color: white;
            font-weight: 600;
            font-size: 1.3rem;
        }

        .navbar-brand img {
            width: 40px;
            height: 40px;
            margin-right: 8px;
        }

        .nav-link {
            color: white !important;
            padding: 8px 12px !important;
            border-radius: 5px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            margin: 2px 0;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-link i {
            margin-right: 6px;
            font-size: 0.9em;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            margin: 70px auto 60px;
            padding: 15px;
        }

        .header-title {
            font-weight: 600;
            color: #008000;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 25px;
        }

        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            background: white;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            background: #008000;
            color: white;
            font-weight: 600;
            padding: 12px 15px;
            border-radius: 10px 10px 0 0;
            font-size: 1rem;
        }

        .card-header i {
            margin-right: 6px;
        }

        .form-control, .form-select {
            border-radius: 8px;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            padding: 10px 12px;
            font-size: 0.95rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: #008000;
            box-shadow: 0 0 5px rgba(0, 128, 0, 0.3);
        }

        .btn-primary {
            background: #008000;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-primary:hover {
            background: #006400;
            transform: translateY(-2px);
        }

        .participation-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .participation-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .participation-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: #008000;
            transition: width 0.3s ease;
        }

        .participation-card:hover::before {
            width: 8px;
        }

        .btn-action {
            padding: 6px 10px;
            font-size: 0.85rem;
            margin: 2px;
            min-width: 70px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            transform: scale(1.05);
        }

        .btn-success {
            background: #28a745;
            border: none;
        }

        .btn-danger {
            background: #dc3545;
            border: none;
        }

        .badge {
            font-size: 0.8rem;
            padding: 5px 8px;
            border-radius: 4px;
            font-weight: 500;
            margin-right: 5px;
            margin-bottom: 5px;
            display: inline-block;
        }

        .bg-registered { background: #ffc107; color: #212529; }
        .bg-attended { background: #28a745; color: white; }
        .bg-absent { background: #dc3545; color: white; }
        .bg-cancelled { background: #6c757d; color: white; }
        .bg-secondary { background: #006400; }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #008000;
            color: white;
            text-align: center;
            padding: 12px 0;
            font-size: 0.9em;
            z-index: 1000;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Mobile-specific styles */
        @media (max-width: 768px) {
            .navbar-brand {
                font-size: 1.2rem;
            }

            .navbar-brand img {
                width: 35px;
                height: 35px;
            }

            .header-title {
                font-size: 1.5rem;
                margin-bottom: 20px;
            }

            .card-header {
                padding: 10px 12px;
                font-size: 0.95rem;
            }

            .form-control, .form-select {
                padding: 8px 10px;
                font-size: 0.9rem;
            }

            .btn-primary {
                padding: 8px 12px;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 576px) {
            .navbar {
                padding: 10px 12px;
            }

            .nav-link {
                font-size: 0.9rem;
                padding: 6px 8px !important;
            }

            .header-title {
                font-size: 1.3rem;
            }

            .btn-action {
                padding: 5px 8px;
                font-size: 0.8rem;
                min-width: 60px;
            }

            .badge {
                font-size: 0.75rem;
                padding: 4px 6px;
            }
        }

        @media (max-width: 400px) {
            .navbar-brand {
                font-size: 1.1rem;
            }

            .navbar-brand img {
                width: 30px;
                height: 30px;
            }

            .header-title {
                font-size: 1.2rem;
            }

            .card {
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <a class="navbar-brand" th:href="@{/admin-dashboard}">
        <img src="Images/NDC-L.png" alt="NDC Logo"> Ayawaso West
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/users}">
                    <i class="fas fa-user-friends"></i> Users
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/voterInput/view}">
                    <i class="fas fa-users"></i> Voters
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/welfareInput/view}">
                    <i class="fas fa-hand-holding-heart"></i> Welfare
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/events}">
                    <i class="fas fa-calendar-check"></i> Events
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/surveys}">
                    <i class="fas fa-poll"></i> Survey
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/participation/view}">
                    <i class="fas fa-user-check"></i> Participation
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/survey-responses}">
                    <i class="fas fa-chart-pie"></i> Responses
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </li>
        </ul>
    </div>
</nav>

<div class="container">
    <h2 class="header-title fade-in">Event Participation List</h2>

    <!-- Filter Section -->
    <div class="card mb-4 fade-in">
        <div class="card-header">
            <i class="fas fa-filter"></i> Filter Participations
        </div>
        <div class="card-body p-3">
            <form action="/participation/view" method="get">
                <div class="row g-3">
                    <div class="col-12 col-md-6 col-lg-4">
                        <select name="voterId" class="form-select">
                            <option value="">All Voters</option>
                            <option th:each="v : ${voters}" th:value="${v.id}"
                                    th:text="${v.voterId + ' - ' + v.fullName}"
                                    th:selected="${v.id == voterId}"></option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6 col-lg-4">
                        <select name="eventId" class="form-select">
                            <option value="">All Events</option>
                            <option th:each="e : ${events}" th:value="${e.id}"
                                    th:text="${e.eventName}"
                                    th:selected="${e.id == eventId}"></option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6 col-lg-4">
                        <select name="status" class="form-select">
                            <option value="">All Statuses</option>
                            <option th:each="s : ${statuses}" th:value="${s}"
                                    th:text="${s}"
                                    th:selected="${s == status}"></option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6">
                        <input type="datetime-local" name="startDate" class="form-control" th:value="${startDate}">
                    </div>
                    <div class="col-12 col-md-6">
                        <input type="datetime-local" name="endDate" class="form-control" th:value="${endDate}">
                    </div>
                    <div class="col-12 mt-2">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-search me-2"></i>Filter
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Participation Records Section -->
    <h4 class="mb-3 fade-in"><i class="fas fa-calendar-check me-2"></i>Participations</h4>

    <div th:each="participation : ${participations}" class="participation-card fade-in">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start">
            <div class="mb-2 mb-md-0 flex-grow-1">
                <h5 class="mb-2"><i class="fas fa-user me-2"></i><span th:text="${participation.voter.fullName}"></span></h5>
                <p class="text-muted mb-3"><strong>Event:</strong> <span th:text="${participation.event.eventName}"></span></p>

                <div class="d-flex flex-wrap align-items-center gap-2">
                    <span class="badge"
                          th:classappend="${participation.status == 'REGISTERED' ? 'bg-registered' :
                                          participation.status == 'ATTENDED' ? 'bg-attended' :
                                          participation.status == 'ABSENT' ? 'bg-absent' : 'bg-cancelled'}"
                          th:text="${participation.status}"></span>
                    <span class="badge bg-secondary" th:text="${participation.voter.voterId}"></span>
                </div>

                <div class="mt-2 text-muted small">
                    <i class="fas fa-calendar-alt me-1"></i>
                    <span th:text="${#temporals.format(participation.participationDate, 'MMM dd, yyyy HH:mm')}"></span>
                </div>
            </div>

            <div class="d-flex mt-3 mt-md-0">
                <a class="btn btn-success btn-action me-2" th:href="@{'/participation/edit/' + ${participation.id}}">
                    <i class="fas fa-edit"></i> Edit
                </a>
                <a class="btn btn-danger btn-action"
                   th:href="@{'/participation/delete/' + ${participation.id}}"
                   onclick="return confirm('Are you sure you want to delete this participation?');">
                    <i class="fas fa-trash"></i> Delete
                </a>
            </div>
        </div>
    </div>
</div>

<footer class="fade-in">
    &copy; 2023 Ayawaso West Constituency - NDC
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
